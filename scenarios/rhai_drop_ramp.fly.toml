# Rhai Phase 3: schedule escalating drop rates
[scenario]
name        = "rhai_drop_ramp"
description = "Rhai script ramps drop_rate every 100ms"
duration    = "1s"
tick        = "1ms"
clock       = "virtual"
mode        = "trace"
seed        = 7
simulated   = true

[[nic]]
name       = "nic0"
batch_size = 64

[nic.traffic]
pattern = "fixed"
pps     = 10000

[nic.payload]
kind = "fixed_seq"
size = 8

[fabric]
name  = "ring0"
slots = 1024

[[consumer]]
name = "c0"
max_per_drain = "unlimited"

[script]
engine = "rhai"
source = '''
    for i in 0..10 {
        at(ms(i * 100));
        let n = nic("nic0");
        n.drop_rate = 0.05 * i;
    }
    at(ms(500));
    let c = consumer("c0");
    c.max_per_drain = 8;
'''
