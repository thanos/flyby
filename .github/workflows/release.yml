name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set; cannot publish to crates.io"
            exit 1
          fi
          # Publish leaves first so dependents resolve from the registry.
          for crate in flyby-core flyby-memory flyby-net flyby-storage flyby; do
            echo "::group::publish $crate"
            cargo publish -p "$crate" --token "${CARGO_REGISTRY_TOKEN}" --locked
            echo "::endgroup::"
            # Give the crates.io index a moment before the next crate.
            sleep 15
          done
