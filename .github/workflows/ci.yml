name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (all backends)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo test (default features)
        run: cargo test --workspace
      - name: cargo test (all features)
        run: cargo test --workspace --all-features
      - name: build examples
        run: cargo build -p flyby-examples

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --all-features --no-deps

  mdbook:
    name: mdbook (project guide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.40"
      - name: Build the project guide
        run: mdbook build docs

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (MSRV 1.95)
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.95
      - name: cargo check (workspace, default features)
        run: cargo check --workspace --all-targets
      - name: cargo test -p flyby-core
        run: cargo test -p flyby-core
      - name: cargo test -p flyby
        run: cargo test -p flyby

  benches-compile:
    name: benches compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Compile Criterion harnesses
        run: cargo test -p flyby-benches --benches --no-run

  coverage:
    name: Coverage (Coveralls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: >
          cargo llvm-cov --workspace --all-features --lcov
          --output-path lcov.info
          --ignore-filename-regex '(examples/|benches/|simulator/src/main\.rs)'
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: lcov.info
          if-no-files-found: error
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
        continue-on-error: true

  publish-check:
    name: crates.io dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Package / dry-run (publish order)
        run: |
          set -euo pipefail
          # Full crates.io dry-run for the leaf crate (no unpublished deps).
          echo "::group::dry-run flyby-core"
          cargo publish -p flyby-core --dry-run --locked
          echo "::endgroup::"
          # Other crates cannot `cargo package` until their path+version workspace
          # deps exist on crates.io. `--list` still validates include/exclude
          # without resolving the registry (verified on the release publish job).
          for crate in flyby-memory flyby-net flyby-storage flyby; do
            echo "::group::package-list $crate"
            cargo package -p "$crate" --list --no-verify --locked >/dev/null
            echo "::endgroup::"
          done
