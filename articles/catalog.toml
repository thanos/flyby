# Articles catalog

Each `[[article]]` is a Medium post hook. Paths are relative to the
workspace root unless noted.

```toml
# schema (informal):
# slug          = URL-safe id (also the articles/<slug>/ folder name)
# title         = Medium headline
# git_tag       = annotated/lightweight tag readers should use
# summary       = one-line blurb
# medium_url    = published URL (omit or empty while drafting)
# assets_dir    = articles/<assets_dir>/ (usually same as slug)
# workload      = "scenario" | "pcap"
# scenario      = built-in flyby-sim scenario name (when workload = scenario)
# pcap          = path to classic pcap (when workload = pcap)
# full_speed    = true/false for pcap replay (default true)
```

[[article]]
slug = "part-vi-simulator-intro"
title = "FlyBy Part VI: A Simulator Before the Hardware"
git_tag = "medium/part-vi-simulator-intro"
summary = "Introduce the first-class simulator with a steady 100 kpps run."
